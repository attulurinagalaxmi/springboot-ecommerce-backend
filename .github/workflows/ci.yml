name: Ecommerce CI

on:
  push:
   branches:
    - main
    - wishlist-feature

  pull_request:
   branches:
    - main

jobs:
 build:
  runs-on: ubuntu-latest

  steps:
  - name: Checkout Code
    uses: actions/checkout@v4
  - name: Setup Java 21
    uses: actions/setup-java@v4
    with:
      java-version: '21'
      distribution: 'temurin'

  - name: Build Project
    run: mvn clean verify

